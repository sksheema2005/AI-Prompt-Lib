<div class="container" *ngIf="prompt()">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <a routerLink="/prompts" class="btn-back" style="margin-bottom: 0;">← Back to List</a>
    <div class="actions" *ngIf="authService.currentUser()?.authenticated && prompt()?.author_id === authService.currentUser()?.id">
      <a [routerLink]="['/edit-prompt', prompt()?.id]" class="btn-edit" style="background: var(--primary-color); color: white; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; margin-right: 1rem; font-weight: bold;">Edit</a>
      <button (click)="deletePrompt()" class="btn-delete" style="background: #ef4444; color: white; padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;">Delete</button>
    </div>
  </div>
  <div class="detail-card">
    <div class="detail-header">
      <h2>{{ prompt()?.title }}</h2>
      <span class="badge" [ngClass]="'complexity-' + prompt()?.complexity">Complexity: Level {{ prompt()?.complexity }}</span>
    </div>

    <div class="tags-row" *ngIf="prompt()?.tags && (prompt()?.tags?.length || 0) > 0">
      <span *ngFor="let tag of prompt()?.tags" class="tag-pill" [style.background-color]="tag.color">
        {{ tag.name }}
      </span>
    </div>

    <div class="metadata">
      <span>Views: {{ prompt()?.view_count }}</span>
      <span>Created: {{ prompt()?.created_at | date:'medium' }}</span>
    </div>
    <div class="content">
      <p>{{ prompt()?.content }}</p>
    </div>
  </div>
</div>
