<div class="container">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to manage your AI prompt library</p>

    <div *ngIf="error" class="error-banner">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" formControlName="username" placeholder="Enter your username" [readonly]="isLoading">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Enter your password" [readonly]="isLoading">
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-primary-action">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner-text">Signing in...</span>
      </button>
    </form>
    
    <div class="footer-note">
      <p>Don't have an account? <a routerLink="/signup">Sign up for free</a></p>
    </div>
  </div>
</div>
