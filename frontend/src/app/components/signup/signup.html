<div class="container">
  <div class="signup-card">
    <h2>Join PromptLib</h2>
    <p class="subtitle">Create an account to start building your library</p>

    <div *ngIf="error" class="error-banner">
      {{ error }}
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" formControlName="username" placeholder="Choose a unique username" [readonly]="isLoading">
        <div *ngIf="signupForm.get('username')?.invalid && (signupForm.get('username')?.dirty || signupForm.get('username')?.touched)" class="error-hint">
          <span *ngIf="signupForm.get('username')?.errors?.['minlength']">Minimum 3 characters required.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="Enter your email" [readonly]="isLoading">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Create a strong password" [readonly]="isLoading">
        <div *ngIf="signupForm.get('password')?.invalid && (signupForm.get('password')?.dirty || signupForm.get('password')?.touched)" class="error-hint">
          <span *ngIf="signupForm.get('password')?.errors?.['minlength']">Minimum 6 characters required.</span>
        </div>
      </div>

      <button type="submit" [disabled]="signupForm.invalid || isLoading" class="btn-primary-action">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading" class="spinner-text">Creating Account...</span>
      </button>
    </form>
    
    <div class="footer-note">
      <p>Already a member? <a routerLink="/login">Log in here</a></p>
    </div>
  </div>
</div>
